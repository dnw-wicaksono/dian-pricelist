<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pricelist Aksessories - Infokom</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f4f4;
}

header{
    background:#005baa;
    color:white;
    text-align:center;
    padding:25px;
}

header h1{
    margin:0;
    font-size:32px;
}

header h2{
    margin:5px 0;
    font-weight:normal;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:20px;
}

input{
    width:100%;
    padding:12px;
    font-size:16px;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
    margin-bottom:15px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th{
    background:#005baa;
    color:white;
    padding:10px;
}

td{
    padding:10px;
    border:1px solid #ddd;
}

tr:nth-child(even){
    background:#f9f9f9;
}

tr:hover{
    background:#eaf4ff;
}

.wa{
    display:inline-block;
    background:#25D366;
    color:white;
    padding:10px 18px;
    border-radius:25px;
    text-decoration:none;
    font-weight:bold;
    margin-left:8px;
}

.wa:hover{
    background:#1da851;
}

.footer{
    text-align:center;
    padding:20px;
    color:#777;
    font-size:14px;
}

@media(max-width:768px){

header h1{
    font-size:24px;
}

table{
    font-size:13px;
}

th,td{
    padding:6px;
}

}

</style>

</head>

<body>

<header>

<h1>Pricelist Aksessories</h1>

<h2>Infokom</h2>

<p><strong>Sales :</strong> Dian Wicaksono</p>

<p>
    WhatsApp :
    <a class="wa"
       href="https://wa.me/6285226356334"
       target="_blank">
       📱 085226356334
    </a>
</p>

</header>

<div class="container">

<input
    type="text"
    id="q"
    placeholder="🔍 Cari nama barang, merk, type, atau spesifikasi..."
    onkeyup="filterRows()">

<table id="tbl">

<thead>

<tr>
    <th>NAMA BARANG</th>
    <th>MERK</th>
    <th>TYPE</th>
    <th>SPESIFIKASI</th>
    <th>HARGA</th>
</tr>

</thead>

<tbody>

<!-- Data akan diambil otomatis dari Google Sheets -->

</tbody>

</table>

</div>
 
<script>
const csvUrl="https://docs.google.com/spreadsheets/d/e/2PACX-1vRgXpStc2KxTmNB3HjLE_M-ZNfbv5QqEnflZtG-A5frwwI_-HSnRWTAFeWNg0lZ78hXh0YGHKOXK8it/pub?gid=0&single=true&output=csv"
;fetch(csvUrl).then(r=>r.text()).then(t=>{
 const rows=t.trim().split(/\r?\n/).map(r=>r.split(","));
 const tb=document.querySelector("#tbl tbody");
 rows.slice(1).forEach(c=>{
  let tr=document.createElement("tr");
  c.forEach((v,i)=>{
    let td=document.createElement("td");
    td.textContent=(i==4 && !isNaN(v))?new Intl.NumberFormat('id-ID',{style:'currency',currency:'IDR',maximumFractionDigits:0}).format(Number(v)):v;
    tr.appendChild(td);
  });
  tb.appendChild(tr);
 });
});
function filterRows(){
 let q=document.getElementById("q").value.toLowerCase();
 document.querySelectorAll("#tbl tbody tr").forEach(r=>{
  r.style.display=r.innerText.toLowerCase().includes(q)?"":"none";
 });
}
</script></body></html>
